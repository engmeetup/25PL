<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>පොළොන්නරුව ඉංජිනේරු හමුව 2025</title>
    <link rel="icon" type="image/jpeg" href="WhatsApp%20Image%202026-04-08%20at%2023.19.50.jpeg">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti for winning effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Sinhala:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Config for Tailwind custom themes if needed -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sinhala: ['"Noto Sans Sinhala"', '"Outfit"', 'sans-serif'],
                        sans: ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center p-4 overflow-x-hidden relative">

    <!-- Background glowing blobs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute w-[500px] h-[500px] bg-purple-700/30 rounded-full blur-[120px] top-[-100px] left-[-150px]">
        </div>
        <div class="absolute w-[400px] h-[400px] bg-cyan-600/20 rounded-full blur-[100px] bottom-[50px] right-[-100px]">
        </div>
    </div>

    <!-- Language Selection Container -->
    <main id="lang-selection-container"
        class="w-full max-w-lg z-10 glass-panel p-8 rounded-[2rem] shadow-2xl transition-all duration-500 relative mt-4 mb-4">

        <div class="flex justify-center mb-6">
            <div class="relative">
                <div class="absolute inset-0 bg-cyan-500 rounded-full blur-md opacity-40 animate-pulse"></div>
                <img src="WhatsApp%20Image%202026-04-08%20at%2023.19.50.jpeg" alt="Meetup Logo"
                    class="relative w-36 h-36 object-cover rounded-full border-4 border-white/20 shadow-xl bounce-animation mb-2 bg-gray-900">
            </div>
        </div>

        <h1
            class="text-2xl md:text-3xl font-extrabold text-center mb-8 font-sans text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 tracking-wide">
            Select Language
        </h1>

        <div class="flex flex-col gap-4 font-sans">
            <button onclick="selectLanguage('en')"
                class="option-btn w-full text-center bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/10 rounded-xl p-4 transition-all duration-200 text-slate-200 shadow-sm text-lg mt-2 font-bold focus:outline-none">
                <span class="relative z-10">English</span>
            </button>
            <button onclick="selectLanguage('si')"
                class="option-btn w-full text-center bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/10 rounded-xl p-4 transition-all duration-200 text-slate-200 shadow-sm text-lg mt-2 font-bold font-sinhala focus:outline-none">
                <span class="relative z-10">සිංහල</span>
            </button>
            <button onclick="selectLanguage('ta')"
                class="option-btn w-full text-center bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/10 rounded-xl p-4 transition-all duration-200 text-slate-200 shadow-sm text-lg mt-2 font-bold focus:outline-none">
                <span class="relative z-10">தமிழ்</span>
            </button>
        </div>
    </main>

    <!-- Main Container -->
    <main id="main-app-container"
        class="hidden w-full max-w-lg z-10 glass-panel p-8 rounded-[2rem] shadow-2xl transition-all duration-500 relative mt-4 mb-4">

        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <div class="relative">
                <div class="absolute inset-0 bg-cyan-500 rounded-full blur-md opacity-40 animate-pulse"></div>
                <img src="WhatsApp%20Image%202026-04-08%20at%2023.19.50.jpeg" alt="Meetup Logo"
                    class="relative w-36 h-36 object-cover rounded-full border-4 border-white/20 shadow-xl bounce-animation mb-2 bg-gray-900">
            </div>
        </div>

        <!-- Headers -->
        <h1 id="main-title"
            class="text-2xl md:text-3xl font-extrabold text-center mb-2 font-sinhala text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 tracking-wide">
            පොළොන්නරුව ඉංජිනේරු හමුව 2025
        </h1>
        <p id="main-subtitle" class="text-center text-cyan-200/60 text-sm md:text-base mb-8 font-sinhala tracking-wide">
            ඔබගේ දැනුම උරගා බලා ස්ථානය දැනගන්න
        </p>

        <!-- Question View -->
        <div id="quiz-container" class="transition-all duration-500">
            <div class="bg-white/5 rounded-2xl p-6 border border-white/10 mb-6 shadow-inner relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-purple-500"></div>
                <div class="flex items-center gap-3 mb-4">
                    <span class="bg-cyan-500/20 text-cyan-400 p-2.5 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </span>
                    <h2 id="challenge-text" class="text-xs font-bold text-cyan-300 tracking-[0.2em] font-sans">CHALLENGE
                    </h2>
                </div>
                <p id="question-text"
                    class="text-lg md:text-xl font-sinhala leading-relaxed text-slate-100 font-medium pb-2">
                    <!-- Question added via JS -->
                </p>
            </div>

            <!-- Options -->
            <div id="options-container" class="flex flex-col gap-3 font-sinhala">
                <!-- Options added via JS -->
            </div>

            <!-- Error message -->
            <div id="error-msg"
                class="hidden mt-5 bg-red-500/10 border border-red-500/30 text-red-300 px-4 py-3 rounded-xl text-center text-sm font-sinhala shadow-[0_0_15px_rgba(239,68,68,0.1)]">
                පිළිතුර වැරදියි. කරුණාකර නැවත උත්සාහ කරන්න!
            </div>
        </div>

        <!-- Success View (Hidden by default) -->
        <div id="success-container" class="hidden flex-col items-center text-center mt-4 fade-in">
            <div
                class="w-24 h-24 bg-green-500/20 rounded-full flex items-center justify-center mb-6 border border-green-500/50 shadow-[0_0_40px_rgba(34,197,94,0.3)]">
                <svg class="w-12 h-12 text-green-400 drop-shadow-md" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 id="success-title" class="text-3xl font-bold font-sinhala mb-3 text-green-400 drop-shadow-sm">විශිෂ්ටයි!
            </h2>
            <p id="success-msg" class="text-slate-300 font-sinhala mb-10 text-base md:text-lg px-2">
                පිළිතුර නිවැරදියි. පහත බොත්තම ඔබා අපගේ හමුව පැවැත්වෙන ස්ථානයට පිවිසෙන්න.
            </p>

            <div onclick="showLocationView()" class="group relative w-full flex justify-center cursor-pointer fade-in">
                <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl blur opacity-70 group-hover:opacity-100 transition duration-300 group-hover:duration-200">
                </div>
                <button type="button" class="relative w-full py-4 bg-gray-900 border border-slate-700/50 rounded-xl font-bold text-white text-lg flex items-center justify-center gap-3 overflow-hidden transition-all duration-300 focus:outline-none">
                    <span id="btn-text" class="relative z-10 font-sinhala text-lg">ස්ථානය බලන්න</span>
                    <svg class="w-5 h-5 relative z-10 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <div class="absolute inset-0 bg-gradient-to-r from-cyan-600 to-blue-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
                </button>
            </div>
        </div>

    </main>

    <!-- Location View Container -->
    <main id="location-view-container" class="hidden w-full max-w-6xl z-10 glass-panel p-6 md:p-8 rounded-[2rem] shadow-2xl transition-all duration-500 relative mt-4 mb-4">
        
        <h2 id="location-title" class="text-2xl md:text-3xl font-extrabold text-center mb-6 font-sinhala text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-green-400 tracking-wide">
            හමුව පැවැත්වෙන ස්ථානය
        </h2>

        <div class="flex flex-col md:flex-row gap-6 h-auto md:h-[70vh] min-h-0 md:min-h-[400px]">
            <!-- Map Half -->
            <div class="w-full md:w-1/2 h-[40vh] md:h-full rounded-3xl overflow-hidden border border-white/10 shadow-xl relative group bg-gray-900 flex-shrink-0">
                <iframe 
                    src="https://maps.google.com/maps?q=Deepa+Uyana+Polonnaruwa&t=&z=15&ie=UTF8&iwloc=&output=embed" 
                    class="w-full h-full border-0 filter opacity-90 group-hover:opacity-100 transition-opacity duration-300" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
                <!-- Link to Maps app -->
                <a href="https://maps.app.goo.gl/STyLC7QEkjwxTeK78" target="_blank" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 border border-slate-700/50 text-white px-5 py-2.5 rounded-xl text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity duration-300 shadow-2xl hover:bg-gray-800 z-20 flex gap-2 items-center min-w-max">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span id="map-link-text" class="font-sans">Open in Google Maps</span>
                </a>
            </div>
            
            <!-- Image Half -->
            <div class="w-full md:w-1/2 h-[40vh] md:h-full rounded-3xl overflow-hidden border border-white/10 shadow-xl relative group bg-gray-900 flex items-center justify-center flex-shrink-0 p-2">
                <img src="place.jpeg" alt="Meeting Place" class="w-full h-full object-contain border-0 opacity-90 group-hover:opacity-100 transition-opacity duration-300">
            </div>
        </div>
        
        <div class="mt-8 flex justify-center">
            <button onclick="goBackToHome()"
                class="group relative px-8 py-3 bg-gray-800 hover:bg-gray-700 border border-white/20 rounded-xl text-slate-200 font-bold transition-all shadow-lg text-sm tracking-widest flex items-center gap-2 focus:outline-none">
                <svg class="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span id="back-btn-text" class="font-sinhala">ආපසු</span>
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
